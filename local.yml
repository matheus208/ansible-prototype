---
- hosts: localhost
  connection: local
  become: true
  tasks:
  - name: install packages
    package:
      name:
        - htop
        - git
        - terminator
        - emacs
        - zsh
        - ripgrep
        - fzf

  - name: install docker dependencies
    package:
      name:
        - bc
        - curl
        - expect
        - git
        - ca-certificates

  - name: Create Docker GPG key directory
    file:
      path: /etc/apt/keyrings
      state: directory
      mode: "0755"

  - name: Download Docker's official GPG key
    get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: "0644"
      
  - name: Add Docker repository to Apt sources
    vars:
      deb_architecture_map:
        arm64: "arm64"
        aarch64: "arm64"
        amd64: "amd64"
        x86_64: "amd64"
    apt_repository:
      repo: "deb [arch={{ deb_architecture_map[ansible_architecture] }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
      state: present
      filename: docker
      
  - name: Update apt cache after adding Docker repository
    apt:
      update_cache: yes
      
  - name: Install Docker and Docker Compose
    package:
      name:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
      state: present
      
  - name: Ensure Docker service is enabled and started
    service:
      name: docker
      state: started
      enabled: yes

  - name: Add ubuntu user to docker group
    become: yes
    user:
      name: "{{ ansible_facts['env']['SUDO_USER'] }}"
      groups: docker
      append: yes

  - name: install openvpn
    package:
      name: openvpn

  - name: Download ohmyzsh
    ansible.builtin.get_url:
      url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
      dest: "/tmp/install.sh"
      mode: '0755'

  - name: Install ohmyzsh
    become: false
    ansible.builtin.script:
      cmd: "/tmp/install.sh"
    args:
      creates: "{{ ansible_env.HOME }}/.oh-my-zsh"
  
  - name: Install zsh-autosuggestions plugin
    become: false
    ansible.builtin.git:
      repo: https://github.com/zsh-users/zsh-autosuggestions
      dest: "/home/{{ ansible_facts['env']['SUDO_USER'] }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
      depth: 1
  
  - name: Install zsh-completions plugin
    become: false
    ansible.builtin.git:
      repo: https://github.com/zsh-users/zsh-completions
      dest: "/home/{{ ansible_facts['env']['SUDO_USER'] }}/.oh-my-zsh/custom/plugins/zsh-completions"
      depth: 1
  
  - name: Install zsh-syntax-highlighting plugin
    become: false
    ansible.builtin.git:
      repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
      dest: "/home/{{ ansible_facts['env']['SUDO_USER'] }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
      depth: 1

  - name: Install Powerline10k theme
    become: false
    ansible.builtin.git:
      repo: https://github.com/romkatv/powerlevel10k.git
      dest: "/home/{{ ansible_facts['env']['SUDO_USER'] }}/.oh-my-zsh/custom/themes/powerlevel10k"
      depth: 1
  
  - name: Change user shell to zsh 
    become: true
    ansible.builtin.user:
      name: "{{ ansible_facts['env']['SUDO_USER'] }}"
      shell: /bin/zsh

  - name: Install nvm
    shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
    args:
      executable: /bin/bash
      chdir: "/home/{{ ansible_facts['env']['SUDO_USER'] }}"
      creates: "/home/{{ ansible_facts['env']['SUDO_USER'] }}/.nvm/nvm.sh"

  - name: Install node 18 to 22, settings 20 as default
    shell: /bin/bash -c "source ~/.nvm/nvm.sh && nvm install {18..22} && nvm alias default 20"
    args:
      creates: "/home/{{ ansible_facts['env']['SUDO_USER'] }}/.nvm/alias"
